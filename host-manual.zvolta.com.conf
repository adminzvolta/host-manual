# nginx site config for host-manual.zvolta.com
# Install: sudo cp host-manual.zvolta.com.conf /etc/nginx/sites-available/
#          sudo ln -s /etc/nginx/sites-available/host-manual.zvolta.com.conf /etc/nginx/sites-enabled/
# TLS certs are provisioned separately via certbot, e.g.:
#          sudo certbot --nginx -d host-manual.zvolta.com
# (certbot will rewrite the ssl_certificate lines below to match)

upstream host_manual_app {
    server 127.0.0.1:3002;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name host-manual.zvolta.com;

    # Let's Encrypt HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name host-manual.zvolta.com;

    ssl_certificate     /etc/letsencrypt/live/host-manual.zvolta.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/host-manual.zvolta.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/host-manual.zvolta.com.access.log;
    error_log  /var/log/nginx/host-manual.zvolta.com.error.log;

    client_max_body_size 10m;

    location / {
        proxy_pass http://host_manual_app;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / HMR support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
